name = "boosthub"
main = "src/index.js"
compatibility_date = "2026-07-19"

[assets]
directory = "public"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "boost-hub-db"
database_id = "REEMPLAZA_CON_TU_DATABASE_ID"

[[r2_buckets]]
binding = "CAPTURES"
bucket_name = "boost-hub-capturas"
